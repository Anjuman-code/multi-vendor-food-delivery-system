name: Staging CI and Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

  deploy-hooks:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks]
    steps:
      - name: Trigger Render staging deploy hook
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_STAGING_DEPLOY_HOOK_URL is not set. Skipping Render deploy trigger."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_STAGING_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."

      - name: Trigger Cloudflare Pages deploy hook
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$CLOUDFLARE_PAGES_DEPLOY_HOOK_URL" ]; then
            echo "CLOUDFLARE_PAGES_DEPLOY_HOOK_URL is not set. Skipping Cloudflare deploy trigger."
            exit 0
          fi

          curl -fsS -X POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK_URL"
          echo "Cloudflare Pages deploy hook triggered."
